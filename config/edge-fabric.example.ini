# Ninj-OS Edge Fabric unified configuration
#
# Service secrets may reference Pterodactyl Startup with env:VARIABLE or may be set from
# the dashboard Secret Vault. Owner credentials are created in the browser setup wizard. Dashboard-managed values are redacted from APIs
# and support bundles, and this file is stored with mode 0600.

[edge]
config_version = 1
instance_name = Ninj-OS Edge Fabric
public_host = 185.83.152.144
primary_allocation_port = 25566
managed_public_udp_ports = 25566,25571,25572-25581
primary_backend = kingdom
routing_mode = primary

[dashboard]
port = 25571
public_host = 185.83.152.144
operator_token = env:DASHBOARD_OPERATOR_TOKEN
viewer_token = env:DASHBOARD_READONLY_TOKEN
metrics_token = env:METRICS_TOKEN
totp_secret = env:DASHBOARD_TOTP_SECRET
session_minutes = 480


[session_core]
enabled = true
version = 1.26.30
listen_host = 0.0.0.0
internal_token = env:SESSION_CORE_TOKEN
motd = Ninj-OS Proxie Network
sub_motd = Universal Bedrock Edge
profiles_folder = runtime/auth-profiles

[companion]
default_secret = env:COMPANION_SHARED_SECRET
presence_ttl_seconds = 120
capture_mode = metadata
selected_packet_ids = 30,77
payload_limit = 512
redact_packet_ids = 1,3,4
queue_capacity = 50000
batch_size = 200
flush_ms = 100
movement_sample_rate = 20
metrics_interval_ticks = 20
reconnect_seconds = 3
presence_enabled = true
presence_include_address = false
transfer_enabled = true
drop_receive_ids =
drop_send_ids =

[transfer]
enabled = true
public_host = 185.83.152.144
port_start = 25572
port_end = 25581
ticket_ttl_seconds = 20
require_source_ip = true

[firewall]
enabled = true
adaptive = true
risk_decay_per_minute = 5
risk_warning_threshold = 40
risk_ban_threshold = 100
progressive_ban_seconds = 30,300,3600,86400
max_datagram_size = 2048
max_packets_per_second_per_ip = 6000
global_packets_per_second = 250000
max_handshakes_per_minute = 30
max_sessions = 512
max_sessions_per_ip = 4

[incident]
enabled = true
trigger_packets_per_second = 180000
trigger_drop_ratio = 0.20
minimum_packets_per_second = 5000
recovery_seconds = 60
rate_divisor = 3
handshake_divisor = 3

[health]
enabled = true
interval_seconds = 5
timeout_ms = 1500
failure_threshold = 3
recovery_threshold = 2
automatic_actions = true
require_companion = false
companion_stale_seconds = 45
degraded_after_seconds = 30
stable_recovery_seconds = 60
minimum_tps = 12
maximum_mspt = 80

[logging]
packet_capture = true
capture_outgoing = true
packet_hex_preview_bytes = 0
packet_log_max_bytes = 52428800
event_log_max_bytes = 10485760
audit_log_max_bytes = 26214400
metric_sample_seconds = 15
metric_retention_days = 30

[discord]
webhook_url = env:DISCORD_WEBHOOK_URL
bot_token = env:DISCORD_BOT_TOKEN
channel_id = env:DISCORD_CHANNEL_ID
summary_minutes = 15

[backend.kingdom]
connection_mode = transparent
backend_adapter = endstone
backend_online_mode = true
require_proxy_identity = false
capacity = 50
fallback_backend = 
display_name = The Kingdom
host = 185.83.152.144
backend_port = 25565
public_port = 25566
enabled = true
fallback = false
protection_profile = kingdom
companion_secret = env:COMPANION_KINGDOM_SECRET

[backend.zoo]
connection_mode = transparent
backend_adapter = proxy_only
backend_online_mode = true
require_proxy_identity = false
capacity = 30
fallback_backend = 
display_name = Zoo
host = 185.83.152.144
backend_port = 19431
public_port = 25571
enabled = true
fallback = false
protection_profile = zoo
companion_secret = env:COMPANION_ZOO_SECRET

[profile.default]
max_datagram_size = 2048
max_packets_per_second_per_ip = 6000
max_handshakes_per_minute = 30
max_sessions_per_ip = 4
allow_new_sessions_during_incident = false

[profile.kingdom]
max_packets_per_second_per_ip = 7000
max_handshakes_per_minute = 35
max_sessions_per_ip = 5

[profile.zoo]
max_packets_per_second_per_ip = 4000
max_handshakes_per_minute = 20
max_sessions_per_ip = 3

# Disabled example of a full proxy backend. Give every full-proxy backend its own
# public UDP listener and keep its private backend port closed to the internet.
[backend.lobby]
connection_mode = full_proxy
backend_adapter = vanilla_bridge
backend_online_mode = false
require_proxy_identity = true
capacity = 25
fallback_backend = kingdom
display_name = Main Lobby
host = 127.0.0.1
backend_port = 19135
public_port = 19134
enabled = false
fallback = true
protection_profile = default
companion_secret = env:COMPANION_LOBBY_SECRET
