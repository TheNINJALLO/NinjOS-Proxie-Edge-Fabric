name: Package Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: dashboard/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: session-core/package-lock.json

      - name: Install Session Core dependencies
        run: npm ci --omit=dev --prefix session-core

      - name: Build, test, and package
        run: ./scripts/package-release.sh

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
          fi
          gh release upload "${GITHUB_REF_NAME}" --clobber \
            "dist/egg-ninjos-proxie-edge-fabric-v7.3.1.json" \
            "dist/install-standalone.sh" \
            "dist/install-windows.ps1" \
            "dist/NinjOS-Proxie-Edge-Fabric-v7.3.1-Runtime.tar.gz" \
            "dist/NinjOS-Proxie-Edge-Fabric-v7.3.1-Source.zip" \
            "dist/NinjOS-Vanilla-Bridge-v7.3.1.mcpack"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ninjos-proxie-release
          path: dist/
          if-no-files-found: error
