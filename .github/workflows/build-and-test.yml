name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: dashboard/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: session-core/package-lock.json

      - name: Install Session Core dependencies
        run: npm ci --omit=dev --prefix session-core

      - name: Build
        run: ./scripts/build.sh

      - name: Test
        run: ./scripts/test.sh
