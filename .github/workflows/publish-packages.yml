name: Publish GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version without a leading v
        required: true
        default: '7.3.16'
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  container:
    name: Publish container image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.23.x'
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: session-core/package-lock.json

      - name: Build current runtime inputs
        run: ./scripts/build.sh

      - name: Select version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version || github.ref_name }}"
          version="${version#v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version: $version" >&2; exit 1; }
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/theninjallo/ninjos-proxie-edge-fabric:${{ steps.version.outputs.value }}
            ghcr.io/theninjallo/ninjos-proxie-edge-fabric:latest
          labels: |
            org.opencontainers.image.title=Ninj-OS Proxie Edge Fabric
            org.opencontainers.image.description=Bedrock Edition edge fabric with dashboard, companion, bridge, and host-agent integrations
            org.opencontainers.image.source=https://github.com/TheNINJALLO/NinjOS-Proxie-Edge-Fabric
            org.opencontainers.image.documentation=https://github.com/TheNINJALLO/NinjOS-Proxie-Edge-Fabric/wiki
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.licenses=AGPL-3.0-only

  npm:
    name: Publish Session Core npm package
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: session-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://npm.pkg.github.com
          scope: '@theninjallo'
          cache: npm
          cache-dependency-path: session-core/package-lock.json

      - name: Install, check, and test
        run: |
          npm ci
          npm run check
          npm test

      - name: Verify requested version
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ inputs.version || github.ref_name }}"
          requested="${requested#v}"
          actual="$(node -p "require('./package.json').version")"
          [[ "$requested" == "$actual" ]] || { echo "Requested $requested but package.json contains $actual" >&2; exit 1; }

      - name: Publish to GitHub Packages
        shell: bash
        run: |
          set -euo pipefail
          package="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${package}@${version}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${package}@${version} is already published; leaving it unchanged."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
