name: Bug report
description: Report a reproducible problem in Ninj-OS Proxie Edge Fabric
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v7.3.6
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Deployment platform
      options:
        - Pterodactyl
        - Linux systemd
        - Windows WSL2
        - Linux Docker
        - Manual Linux supervisor
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove tokens, passwords, setup codes, webhook URLs, and private addresses.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed all secrets and private credentials.
          required: true
        - label: I reviewed the troubleshooting guide.
          required: true
